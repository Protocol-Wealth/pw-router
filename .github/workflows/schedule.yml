name: Machine Schedule

# 10 AM - 4 PM Eastern, weekdays only
# UTC times assume EDT (UTC-4). In winter (EST/UTC-5) this shifts to 9 AM - 3 PM ET.
# Adjust crons by +1 hour in November if needed.

on:
  workflow_dispatch:  # Manual only — pw-router is discontinued
    inputs:
      action:
        description: "start or stop"
        required: true
        type: choice
        options:
          - start
          - stop

jobs:
  manage-machines:
    runs-on: ubuntu-latest
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          else
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "0 14 * * 1-5" ]; then
              echo "action=start" >> "$GITHUB_OUTPUT"
            else
              echo "action=stop" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: ${{ steps.action.outputs.action }} machines
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          MACHINE_LIST: ${{ secrets.FLY_MACHINE_LIST }}
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          echo "Action: $ACTION"

          IFS=',' read -ra MACHINES <<< "$MACHINE_LIST"
          for APP_MACHINE in "${MACHINES[@]}"; do
            APP="${APP_MACHINE%%:*}"
            MACHINE="${APP_MACHINE##*:}"
            echo "→ $ACTION $APP"
            flyctl machines "$ACTION" "$MACHINE" --app "$APP" || true
          done
