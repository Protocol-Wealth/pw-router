name: CI

on:
  workflow_dispatch:  # Manual only — pw-router is discontinued (replaced by pw-os)

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check pw_router/ tests/ plugins/
      - run: ruff format --check pw_router/ tests/ plugins/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -v --tb=short
